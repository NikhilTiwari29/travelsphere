# Seat Service owns cabin classes, seat maps, and per-flight seat inventory.
server:
  port: 5005

spring:
  application:
    name: seat-service

  # Imports shared configuration from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

  # Local datasource is used when Config Server does not override these values.
  datasource:
    url: jdbc:mysql://localhost:3306/airline_seat_db
    username: root
    password: NikTiwari@1234
  jpa:
    hibernate:
      ddl-auto: update

  # Consumes flight-instance-created and booking events to maintain seat inventory.
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: seat-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.nikhil.common_lib.event
  cloud:
    # Feign circuit breakers protect calls to airline-core-service.
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

# Resilience4j controls fallback behavior for Seat Service Feign dependencies.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException
    instances:
      AirlineClient:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s

# Registers seat-service with Eureka and enables service-name based calls.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

# Metadata exposed through Actuator info.
info:
  app:
    name: ${spring.application.name}
    description: Manages seat inventory and cabin configuration for flight instances
    version: 1.0.0
    environment: development

# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        # Exposes health, application info, metrics, and Prometheus endpoints.
        include: health,info,metrics,prometheus

  endpoint:
    health:
      # Displays detailed health information for monitoring.
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      # Adds the application name as a common tag to all metrics.
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        # Enables latency histograms for HTTP request metrics.
        http.server.requests: true

  observations:
    key-values:
      # Adds the application name to all observations (metrics and traces).
      application: ${spring.application.name}

    annotations:
      # Enables Micrometer observation annotations (@Observed).
      enabled: true

  tracing:
    sampling:
      # Samples 100% of requests for distributed tracing.
      probability: 1.0

    export:
      zipkin:
        # Exports tracing spans to Grafana Tempo using the Zipkin protocol.
        endpoint: http://localhost:9411/api/v2/spans


# =============================================================================
# LOGGING
# =============================================================================

logging:
  pattern:
    # Includes Trace ID and Span ID in every log entry for log-trace correlation.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender for centralized log aggregation.
  url: http://localhost:3100/loki/api/v1/push
