# Registers subscription-service with Eureka for future Gateway/Feign routing.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    name: subscription-service

  # Loads service-specific settings from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

# Metadata exposed through Actuator info.
info:
  app:
    name: ${spring.application.name}
    description: Manages user subscriptions and membership plans
    version: 1.0.0
    environment: development

# Health/info endpoints confirm subscription-service readiness.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
