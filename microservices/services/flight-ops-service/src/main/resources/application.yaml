# Flight Ops Service owns flight definitions, recurring schedules,
# and concrete dated flight instances.
server:
  port: 5002

spring:
  application:
    # Service name used by Config Server and Eureka service discovery.
    name: flight-ops-service

  # Loads centralized configuration from Config Server.
  # "optional" allows local startup when Config Server is unavailable.
  config:
    import: optional:configserver:http://localhost:8888

  # Redis provides a shared distributed cache across multiple service instances.
  # Used by Spring Cache annotations such as @Cacheable and @CacheEvict.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis

  # Flight Ops owns its database following the database-per-service pattern.
  # Other services access this data through APIs or events, not direct DB queries.
  datasource:
    url: jdbc:mysql://localhost:3306/airline_flight_db
    username: root
    password: NikTiwari@1234

  jpa:
    hibernate:
      # Suitable for development. Use Flyway/Liquibase migrations in production.
      ddl-auto: update

  # Publishes FlightInstanceCreatedEvent after a dated flight instance is created.
  # Seat Service consumes the event to provision runtime cabin and seat inventory.
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

  cloud:
    openfeign:
      circuitbreaker:
        # Protects Feign calls from cascading failures when downstream services fail.
        enabled: true

        # Groups circuit breakers by Feign client configuration.
        group:
          enabled: true

# Circuit breakers protect synchronous Feign calls to downstream services.
#
# State flow:
# CLOSED → failure threshold reached → OPEN
# OPEN   → wait duration elapsed    → HALF_OPEN
# HALF_OPEN → trial calls determine whether to return to CLOSED or OPEN.
resilience4j:
  circuitbreaker:
    configs:
      default:

        # Evaluates the latest 20 calls instead of using a time-based window.
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20

        # Failure rate is evaluated only after at least 10 calls.
        # Prevents the circuit from opening because of a small initial sample.
        minimum-number-of-calls: 10

        # Opens the circuit when 50% of measured calls fail.
        failure-rate-threshold: 50

        # Opens the circuit when 80% of measured calls exceed the slow-call limit.
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms

        # Keep the circuit OPEN for 30 seconds before testing recovery.
        wait-duration-in-open-state: 30s

        # Allow five test requests while the circuit is HALF_OPEN.
        permitted-number-of-calls-in-half-open-state: 5

        # Automatically transitions OPEN → HALF_OPEN after the wait period.
        automatic-transition-from-open-to-half-open-enabled: true

        # Exposes circuit-breaker state through Actuator health information.
        register-health-indicator: true

        # Infrastructure and remote-call failures contribute to failure rate.
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

        # Business exceptions do not indicate an unhealthy downstream service
        # and therefore should not contribute to circuit-breaker failure rate.
        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException

    # Each downstream Feign client inherits the default configuration
    # and overrides only dependency-specific thresholds where required.
    instances:
      AirlineClient:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s

      LocationClient:
        base-config: default
        wait-duration-in-open-state: 20s

      PricingClient:
        base-config: default

      SeatClient:
        base-config: default


# Eureka provides service discovery so clients use logical service names
# instead of hardcoded IP addresses and ports.
eureka:
  instance:
    prefer-ip-address: true

    # Unique instance ID supports multiple horizontally scaled service instances.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    # Registers this service instance and downloads the registry
    # for discovery of other microservices.
    register-with-eureka: true
    fetch-registry: true


# Application metadata exposed through the Actuator /info endpoint.
info:
  app:
    name: ${spring.application.name}
    description: Manages flight schedules, instances, and real-time flight operations
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        # Exposes health, application info, metrics, and Prometheus endpoints.
        include: health,info,metrics,prometheus

  endpoint:
    health:
      # Displays detailed health information for monitoring.
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      # Adds the application name as a common tag to all metrics.
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        # Enables latency histograms for HTTP request metrics.
        http.server.requests: true

  observations:
    key-values:
      # Adds the application name to all observations (metrics and traces).
      application: ${spring.application.name}

    annotations:
      # Enables Micrometer observation annotations (@Observed).
      enabled: true

  tracing:
    sampling:
      # Samples 100% of requests for distributed tracing.
      probability: 1.0

    export:
      zipkin:
        # Exports tracing spans to Grafana Tempo using the Zipkin protocol.
        endpoint: http://localhost:9411/api/v2/spans


# =============================================================================
# LOGGING
# =============================================================================

logging:
  pattern:
    # Includes Trace ID and Span ID in every log entry for log-trace correlation.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender for centralized log aggregation.
  url: http://localhost:3100/loki/api/v1/push