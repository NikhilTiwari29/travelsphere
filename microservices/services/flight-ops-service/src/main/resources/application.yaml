# Flight Ops owns flight schedules and generated flight instances.
server:
  port: 5002

spring:
  application:
    name: flight-ops-service

  # Imports shared configuration from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

  # Redis backs Spring Cache for read-heavy flight and search data.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  cache:
    type: redis

  # Local datasource is used when Config Server does not override these values.
  datasource:
    url: jdbc:mysql://localhost:3306/airline_flight_db
    username: root
    password: NikTiwari@1234
  jpa:
    hibernate:
      ddl-auto: update

  # Publishes flight-instance-created events consumed by Seat Service.
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
  cloud:
    # Feign circuit breakers protect calls to airline, location, pricing, and seat services.
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

# Resilience4j defines failure thresholds for downstream Feign dependencies.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException
    instances:
      AirlineClient:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
      LocationClient:
        base-config: default
        wait-duration-in-open-state: 20s
      PricingClient:
        base-config: default
      SeatClient:
        base-config: default

# Registers flight-ops-service with Eureka and discovers dependent services.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

# Metadata exposed through Actuator info.
info:
  app:
    name: ${spring.application.name}
    description: Manages flight schedules, instances, and real-time flight operations
    version: 1.0.0
    environment: development

# Exposes service health and circuit-breaker status for operations.
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
