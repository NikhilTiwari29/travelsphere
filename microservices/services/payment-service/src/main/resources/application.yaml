spring:
  application:
    name: payment-service

  # Loads shared payment-service configuration from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

  # Publishes payment.completed and payment.failed events consumed by Booking Service.
  kafka:
    bootstrap-servers: localhost:9092

  # Feign circuit breakers protect calls back to User Service during payment flows.
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

# Razorpay settings are used when creating hosted payment links.
razorpay:
  api:
    key: your razorpay key
    secret: your razorpay secret
  callback:
    base-url: http://localhost:5173

# Stripe settings support alternate payment gateway integration.
stripe:
  api:
    key: your stripe api key

# Resilience4j protects Feign calls used during payment processing.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException
    instances:
      UserClient:
        base-config: default
        failure-rate-threshold: 40

# Registers payment-service with Eureka and discovers other services.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

# Metadata exposed through Actuator info.
info:
  app:
    name: ${spring.application.name}
    description: Handles payment processing via Razorpay and Stripe gateways
    version: 1.0.0
    environment: development

# Exposes health and circuit-breaker status for payment operations.
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
