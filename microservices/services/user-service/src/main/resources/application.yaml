# =============================================================================
# USER SERVICE — Local Configuration
# =============================================================================
#
# Local configuration should contain configuration required to identify the
# application and connect to the Config Server.
#
# Config Server provides shared and service-specific operational configuration.
# Avoid defining the same operational property in multiple configuration
# sources unless the intended precedence has been deliberately verified.
# =============================================================================

spring:
  application:
    # Unique service name used by Config Server, Eureka, and observability tools.
    name: user-service

  config:
    # Loads externalized configuration from the Spring Cloud Config Server.
    import: optional:configserver:http://localhost:8888


# =============================================================================
# EUREKA CLIENT
# =============================================================================

eureka:
  instance:
    # Registers the service using its IP address instead of hostname.
    prefer-ip-address: true

    # Generates a unique instance ID for each running service instance.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    # Registers this service with Eureka for service discovery.
    register-with-eureka: true

    # Downloads the service registry to discover other microservices.
    fetch-registry: true


# =============================================================================
# ACTUATOR INFO
# =============================================================================

info:
  app:
    name: ${spring.application.name}
    description: Manages user accounts, profiles, and authentication
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        # Exposes health, application info, metrics, and Prometheus endpoints.
        include: health,info,metrics,prometheus

  endpoint:
    health:
      # Displays detailed health information for monitoring.
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      # Adds the application name as a common tag to all metrics.
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        # Enables latency histograms for HTTP request metrics.
        http.server.requests: true

  observations:
    key-values:
      # Adds the application name to all observations (metrics and traces).
      application: ${spring.application.name}

    annotations:
      # Enables Micrometer observation annotations (@Observed).
      enabled: true

  tracing:
    sampling:
      # Samples 100% of requests for distributed tracing.
      probability: 1.0

    export:
      zipkin:
        # Exports tracing spans to Grafana Tempo using the Zipkin protocol.
        endpoint: http://localhost:9411/api/v2/spans


# =============================================================================
# LOGGING
# =============================================================================

logging:
  pattern:
    # Includes Trace ID and Span ID in every log entry for log-trace correlation.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender for centralized log aggregation.
  url: http://localhost:3100/loki/api/v1/push