# =============================================================================
# USER SERVICE — Local Configuration
# =============================================================================
#
# HOW CONFIG LOADING WORKS:
# -------------------------
# 1. This file (application.yaml) is read FIRST at startup
# 2. spring.config.import tells Spring to fetch MORE config from Config Server
# 3. Config Server returns:
#      - config-repo/application.yml    → shared defaults (eureka, jpa settings)
#      - config-repo/user-service.yml   → this service's config (port, datasource)
# 4. Remote config OVERRIDES local config for the same keys
#
# So you only need TWO things in this local file:
#   a) spring.application.name → tells Config Server WHICH config file to return
#   b) spring.config.import    → tells Spring WHERE Config Server is
#
# Everything else (port, DB, eureka, jpa) comes from Config Server.
# =============================================================================

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    # MUST match the config file name in config-repo (user-service.yml)
    # Previously this was "User Service" (with space) which would NOT match.
    # Config Server looks for: {spring.application.name}.yml in the config repo.
    name: user-service

  config:
    # Tells Spring Boot to fetch config from Config Server before starting.
    # "optional:" prefix means: if Config Server is down, start anyway with local config.
    # Without "optional:", the service REFUSES to start if Config Server is unreachable.
    import: optional:configserver:http://localhost:8888

info:
  app:
    name: ${spring.application.name}
    description: Manages user accounts, profiles, and authentication
    version: 1.0.0
    environment: development

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
