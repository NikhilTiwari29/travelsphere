spring:
  application:
    name: ancillary-service

  # Loads shared service configuration from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

  # Feign circuit breakers protect calls to airline, location, and seat services.
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

# Resilience4j settings control when Feign calls fail fast and use fallbacks.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException
    instances:
      AirlineClient:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
      LocationClient:
        base-config: default
        wait-duration-in-open-state: 20s
      SeatClient:
        base-config: default

# Registers this service with Eureka and enables discovery of downstream services.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

# Metadata exposed through Actuator info for operators and dashboards.
info:
  app:
    name: ${spring.application.name}
    description: Manages ancillary services such as baggage, meals, and seat upgrades
    version: 1.0.0
    environment: development

# Exposes health and circuit-breaker state for production troubleshooting.
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
