# Registers airline-core-service with Eureka and allows Feign/Gateway callers
# to resolve it by service name.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    name: airline-core-service

  # Pulls database and shared infrastructure settings from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

  # Redis backs Spring Cache for frequently read airline and aircraft master data.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  cache:
    type: redis

# Metadata exposed through Actuator for runtime identification.
info:
  app:
    name: ${spring.application.name}
    description: Manages airline and aircraft master data
    version: 1.0.0
    environment: development

# Health/info endpoints help verify service readiness and environment details.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
