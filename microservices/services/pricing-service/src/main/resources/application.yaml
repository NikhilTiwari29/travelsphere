# Registers pricing-service so Gateway, Booking, and Flight Ops can resolve fare APIs.
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    name: pricing-service

  # Loads shared database/cache configuration from Config Server when available.
  config:
    import: optional:configserver:http://localhost:8888

  # Redis backs Spring Cache for fare, fare-rule, and baggage-policy reads.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  cache:
    type: redis

# Metadata exposed through Actuator info.
info:
  app:
    name: ${spring.application.name}
    description: Manages fares and pricing rules for flight instances
    version: 1.0.0
    environment: development

# Health/info endpoints confirm pricing-service readiness.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
