global:
  # Prometheus scrapes every configured service every 10 seconds.
  scrape_interval: 10s

  # Recording and alerting rules are evaluated every 10 seconds.
  evaluation_interval: 10s


scrape_configs:

  # ============================================================
  # API GATEWAY
  # ============================================================
  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5000"


  # ============================================================
  # USER SERVICE
  # ============================================================
  - job_name: "user-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5001"


  # ============================================================
  # FLIGHT OPS SERVICE
  # ============================================================
  - job_name: "flight-ops-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5002"


  # ============================================================
  # AIRLINE CORE SERVICE
  # ============================================================
  - job_name: "airline-core-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5003"


  # ============================================================
  # LOCATION SERVICE
  # ============================================================
  - job_name: "location-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5004"


  # ============================================================
  # SEAT SERVICE
  # ============================================================
  - job_name: "seat-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5005"


  # ============================================================
  # PRICING SERVICE
  # ============================================================
  - job_name: "pricing-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5006"


  # ============================================================
  # ANCILLARY SERVICE
  # ============================================================
  - job_name: "ancillary-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5007"


  # ============================================================
  # BOOKING SERVICE
  # ============================================================
  - job_name: "booking-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5008"


  # ============================================================
  # PAYMENT SERVICE
  # ============================================================
  - job_name: "payment-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:5009"


  # ============================================================
  # NOTIFICATION SERVICE
  # ============================================================
  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:8094"


  # ============================================================
  # SERVICE REGISTRY
  # ============================================================
  - job_name: "service-registry"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:8761"


  # ============================================================
  # CONFIG SERVER
  # ============================================================
  - job_name: "config-server"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:8888"