# =============================================================================
# Airline Microservices — Docker Compose
# =============================================================================
# ONLY API GATEWAY (Port 5000) is exposed externally
# All other services are internal only
# =============================================================================

services:

  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # ========== USER DB ==========
  userdb:
    image: mysql:8.0
    container_name: userdb
    ports:
      - "127.0.0.1:3302:3306"  # LOCALHOST ONLY - for debugging if needed
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_user
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== AIRLINE CORE DB ==========
  airlinecoredb:
    image: mysql:8.0
    container_name: airlinecoredb
    ports:
      - "127.0.0.1:3303:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_core_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== FLIGHT OPS DB ==========
  flightopsdb:
    image: mysql:8.0
    container_name: flightopsdb
    ports:
      - "127.0.0.1:3304:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_flight_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== LOCATION DB ==========
  locationdb:
    image: mysql:8.0
    container_name: locationdb
    ports:
      - "127.0.0.1:3305:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_location_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== SEAT DB ==========
  seatdb:
    image: mysql:8.0
    container_name: seatdb
    ports:
      - "127.0.0.1:3311:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_seat_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== PRICING DB ==========
  pricingdb:
    image: mysql:8.0
    container_name: pricingdb
    ports:
      - "127.0.0.1:3307:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_pricing_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== ANCILLARY DB ==========
  ancillarydb:
    image: mysql:8.0
    container_name: ancillarydb
    ports:
      - "127.0.0.1:3308:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_ancillary_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== BOOKING DB ==========
  bookingdb:
    image: mysql:8.0
    container_name: bookingdb
    ports:
      - "127.0.0.1:3309:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_booking_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== PAYMENT DB ==========
  paymentdb:
    image: mysql:8.0
    container_name: paymentdb
    ports:
      - "127.0.0.1:3310:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_payment_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil


  # ===========================================================================
  # KAFKA (KRaft Mode - No Zookeeper)
  # ===========================================================================

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    # NO PORTS EXPOSED - Internal only
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092  # Internal service name
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - nikhil

  # ===========================================================================
  # CONFIG SERVER
  # ===========================================================================

  config-server:
    image: "nikhiltiwarip29/gds-config-server:1.0.0"
    container_name: gds-config-server
    # NO PORTS EXPOSED - Internal only
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: "https://github.com/NikhilTiwari29/nikhil-air-config"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ===========================================================================
  # SERVICE REGISTRY (Eureka)
  # ===========================================================================

  service-registry:
    image: "nikhiltiwarip29/gds-service-registry:1.0.0"
    container_name: gds-eureka-server
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - nikhil

  # ===========================================================================
  # API GATEWAY - ONLY EXTERNALLY EXPOSED SERVICE
  # ===========================================================================

  api-gateway:
    image: "nikhiltiwarip29/gds-api-gateway:1.0.0"
    container_name: gds-api-gateway
    ports:
      - "5000:5000"  # ONLY PORT EXPOSED TO THE WORLD
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "api-gateway"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      # Gateway routes will be configured to forward to internal services
    networks:
      - nikhil

  # ===========================================================================
  # BUSINESS SERVICES - ALL INTERNAL (NO PORTS EXPOSED)
  # ===========================================================================

  user-service:
    image: "nikhiltiwarip29/gds-user:1.0.0"
    container_name: gds-user-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/airline_user?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  airline-core-service:
    image: "nikhiltiwarip29/gds-airline:1.0.0"
    container_name: gds-airline-core-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      airlinecoredb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "airline-core-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://airlinecoredb:3306/airline_core_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  flight-ops-service:
    image: "nikhiltiwarip29/gds-flight:1.0.0"
    container_name: gds-flight-ops-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      flightopsdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "flight-ops-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://flightopsdb:3306/airline_flight_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - nikhil

  location-service:
    image: "nikhiltiwarip29/gds-location:1.0.0"
    container_name: gds-location-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      locationdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "location-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://locationdb:3306/airline_location_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  seat-service:
    image: "nikhiltiwarip29/gds-seat:1.0.0"
    container_name: gds-seat-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      seatdb:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "seat-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://seatdb:3306/airline_seat_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - nikhil

  pricing-service:
    image: "nikhiltiwarip29/gds-pricing:1.0.0"
    container_name: gds-pricing-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      pricingdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "pricing-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://pricingdb:3306/airline_pricing_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  ancillary-service:
    image: "nikhiltiwarip29/gds-ancillary:1.0.0"
    container_name: gds-ancillary-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      ancillarydb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "ancillary-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://ancillarydb:3306/airline_ancillary_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  booking-service:
    image: "nikhiltiwarip29/gds-booking:1.0.0"
    container_name: gds-booking-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      bookingdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "booking-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://bookingdb:3306/airline_booking_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  payment-service:
    image: "nikhiltiwarip29/gds-payment:1.0.0"
    container_name: gds-payment-service
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      paymentdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "payment-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://paymentdb:3306/airline_payment_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
