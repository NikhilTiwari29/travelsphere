# =============================================================================
# Airline Microservices — Docker Compose
# =============================================================================
# Startup order: airlinedb → config-server → service-registry → all services
# =============================================================================

services:

  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # ========== USER DB ==========
  userdb:
    image: mysql:8.0
    container_name: userdb
    ports:
#      - "3302:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_user
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== AIRLINE CORE DB ==========
  airlinecoredb:
    image: mysql:8.0
    container_name: airlinecoredb
    ports:
#      - "3303:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_core_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== FLIGHT OPS DB ==========
  flightopsdb:
    image: mysql:8.0
    container_name: flightopsdb
    ports:
#      - "3304:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_flight_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== LOCATION DB ==========
  locationdb:
    image: mysql:8.0
    container_name: locationdb
    ports:
#      - "3305:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_location_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== SEAT DB ==========
  seatdb:
    image: mysql:8.0
    container_name: seatdb
    ports:
#      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_seat_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== PRICING DB ==========
  pricingdb:
    image: mysql:8.0
    container_name: pricingdb
    ports:
#      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_pricing_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== ANCILLARY DB ==========
  ancillarydb:
    image: mysql:8.0
    container_name: ancillarydb
    ports:
#      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_ancillary_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== BOOKING DB ==========
  bookingdb:
    image: mysql:8.0
    container_name: bookingdb
    ports:
#      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_booking_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  # ========== PAYMENT DB ==========
  paymentdb:
    image: mysql:8.0
    container_name: paymentdb
    ports:
#      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_payment_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nikhil


  # ===========================================================================
  # KAFKA (KRaft Mode - No Zookeeper)
  # ===========================================================================

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
#      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

      # 🔥 REQUIRED for single node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    networks:
      - nikhil




  config-server:
    image: "nikhiltiwarip29/gds-config-server:1.0.0"
    container_name: gds-config-server
    ports:
#      - "8888:8888"
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: "https://github.com/developer407/gds-config"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - nikhil

  service-registry:
    image: "nikhiltiwarip29/gds-service-registry:1.0.0"
    container_name: gds-eureka-server
    ports:
#      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - nikhil

  # ===========================================================================
  # API GATEWAY
  # ===========================================================================

  api-gateway:
    image: "nikhiltiwarip29/gds-api-gateway:1.0.0"
    container_name: gds-api-gateway
    ports:
      - "5000:5000"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "api-gateway"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  # ===========================================================================
  # BUSINESS SERVICES
  # ===========================================================================

  user-service:
    image: "nikhiltiwarip29/gds-user:1.0.0"
    container_name: gds-user-service
    ports:
#      - "5001:5001"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/airline_user"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  airline-core-service:
    image: "nikhiltiwarip29/gds-airline:1.0.0"
    container_name: gds-airline-core-service
    ports:
#      - "5003:5003"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      airlinecoredb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "airline-core-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://airlinecoredb:3306/airline_core_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  flight-ops-service:
    image: "nikhiltiwarip29/gds-flight:1.0.0"
    container_name: gds-flight-ops-service
    ports:
#      - "5002:5002"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      flightopsdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "flight-ops-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://flightopsdb:3306/airline_flight_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - nikhil

  location-service:
    image: "nikhiltiwarip29/gds-location:1.0.0"
    container_name: gds-location-service
    ports:
#      - "5004:5004"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      locationdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "location-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://locationdb:3306/airline_location_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"

    networks:
      - nikhil

  seat-service:
    image: "nikhiltiwarip29/gds-seat:1.0.0"
    container_name: gds-seat-service
    ports:
#      - "5005:5005"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      seatdb:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "seat-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://seatdb:3306/airline_seat_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - nikhil

  pricing-service:
    image: "nikhiltiwarip29/gds-pricing:1.0.0"
    container_name: gds-pricing-service
    ports:
#      - "5006:5006"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      pricingdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "pricing-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://pricingdb:3306/airline_pricing_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  ancillary-service:
    image: "nikhiltiwarip29/gds-ancillary:1.0.0"
    container_name: gds-ancillary-service
    ports:
#      - "5007:5007"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      ancillarydb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "ancillary-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://ancillarydb:3306/airline_ancillary_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  booking-service:
    image: "nikhiltiwarip29/gds-booking:1.0.0"
    container_name: gds-booking-service
    ports:
#      - "5008:5008"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      bookingdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "booking-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://bookingdb:3306/airline_booking_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
    networks:
      - nikhil

  payment-service:
    image: "nikhiltiwarip29/gds-payment:1.0.0"
    container_name: gds-payment-service
    ports:
#      - "5009:5009"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      paymentdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "payment-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://paymentdb:3306/airline_payment_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - nikhil

networks:
  nikhil:
    driver: bridge
