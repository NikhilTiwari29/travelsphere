# =============================================================================
# SERVER
# =============================================================================

server:
  # HTTP port on which this microservice listens.
  port: 5009


# =============================================================================
# SPRING
# =============================================================================

spring:
  application:
    # Unique service name registered with Eureka and observability tools.
    name: payment-service

  datasource:
    # Database connection details supplied through environment variables.
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # Publishes payment events consumed by Booking Service.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # Enables Feign circuit breakers.
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true


# =============================================================================
# RAZORPAY
# =============================================================================

razorpay:
  api:
    key: ${RAZORPAY_API_KEY}
    secret: ${RAZORPAY_API_SECRET}

  callback:
    base-url: ${RAZORPAY_CALLBACK_URL:http://localhost:5173}


# =============================================================================
# STRIPE
# =============================================================================

stripe:
  api:
    key: ${STRIPE_API_KEY}


# =============================================================================
# RESILIENCE4J
# =============================================================================

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException

    instances:
      UserClient:
        base-config: default
        failure-rate-threshold: 40


# =============================================================================
# EUREKA CLIENT
# =============================================================================

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    register-with-eureka: true
    fetch-registry: true


# =============================================================================
# ACTUATOR INFO
# =============================================================================

info:
  app:
    name: ${spring.application.name}
    description: Handles payment processing via Razorpay and Stripe gateways
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        http.server.requests: true

  observations:
    key-values:
      application: ${spring.application.name}

    annotations:
      enabled: true

  tracing:
    sampling:
      probability: 1.0

    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}


# =============================================================================
# LOGGING
# =============================================================================

logging:
  level:
    root: INFO
    com.nikhil.services: DEBUG

  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}