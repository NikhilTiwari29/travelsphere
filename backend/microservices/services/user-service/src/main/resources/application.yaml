# =============================================================================
# SERVER
# =============================================================================

server:
  # HTTP port on which this microservice listens.
  # Uses SERVER_PORT if provided; otherwise defaults to 5001.
  port: ${SERVER_PORT:5001}


# =============================================================================
# SPRING
# =============================================================================

spring:
  application:
    # Unique service name used by Eureka, Micrometer, and observability tools.
    name: user-service

  datasource:
    # Database connection details are supplied through environment variables.
    # This keeps sensitive information out of source control and allows
    # different values for local, Docker, and production environments.
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


# =============================================================================
# EUREKA CLIENT
# =============================================================================

eureka:
  instance:
    # Registers the service using its IP address instead of hostname.
    prefer-ip-address: true

    # Generates a unique instance ID for each running service instance.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    # Registers this service with Eureka for service discovery.
    register-with-eureka: true

    # Downloads the service registry to discover other microservices.
    fetch-registry: true


# =============================================================================
# ACTUATOR INFO
# =============================================================================

info:
  app:
    name: ${spring.application.name}
    description: Manages user accounts, profiles, and authentication
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        # Exposes health, application info, metrics, and Prometheus endpoints.
        include: health,info,metrics,prometheus

  endpoint:
    health:
      # Displays detailed health information for monitoring.
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      # Adds the application name as a common tag to all metrics.
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        # Enables latency histograms for HTTP request metrics.
        http.server.requests: true

  observations:
    key-values:
      # Adds the application name to all observations (metrics and traces).
      application: ${spring.application.name}

    annotations:
      # Enables Micrometer observation annotations (@Observed).
      enabled: true

  tracing:
    sampling:
      # Samples 100% of requests for distributed tracing.
      probability: 1.0

    export:
      zipkin:
        # Exports tracing spans to Grafana Tempo using the Zipkin protocol.
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}


# =============================================================================
# LOGGING
# =============================================================================

logging:
  level:
    root: INFO
    com.nikhil.services: DEBUG

  pattern:
    # Includes Trace ID and Span ID in every log entry for log-trace correlation.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender for centralized log aggregation.
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}