# =============================================================================
# SERVER
# =============================================================================

server:
  # HTTP port on which this microservice listens.
  port: 5004


# =============================================================================
# SPRING
# =============================================================================

spring:
  application:
    # Unique service name registered with Eureka and observability tools.
    name: location-service

  datasource:
    # Database connection details supplied through environment variables.
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  # Redis backs Spring Cache for frequently accessed city and airport data.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # Enables Redis as the backend for @Cacheable and @CacheEvict.
  cache:
    type: redis


# =============================================================================
# EUREKA CLIENT
# =============================================================================

eureka:
  instance:
    # Registers the service using its IP address.
    prefer-ip-address: true

    # Generates a unique instance ID for each running service instance.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    # Registers this service with Eureka.
    register-with-eureka: true

    # Downloads the service registry to discover other microservices.
    fetch-registry: true


# =============================================================================
# ACTUATOR INFO
# =============================================================================

info:
  app:
    name: ${spring.application.name}
    description: Manages airports and city location data
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        http.server.requests: true

  observations:
    key-values:
      application: ${spring.application.name}

    annotations:
      enabled: true

  tracing:
    sampling:
      probability: 1.0

    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}


# =============================================================================
# LOGGING
# =============================================================================

logging:
  level:
    root: INFO
    com.nikhil.services: DEBUG

  pattern:
    # Includes Trace ID and Span ID in every log entry.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender.
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}