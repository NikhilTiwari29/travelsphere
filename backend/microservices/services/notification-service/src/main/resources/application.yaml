# =============================================================================
# SERVER
# =============================================================================

server:
  # HTTP port on which this microservice listens.
  port: 8094


# =============================================================================
# SPRING
# =============================================================================

spring:
  application:
    # Unique service name registered with Eureka and observability tools.
    name: notification-service

  # Kafka consumer configuration.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer

      properties:
        spring.json.trusted.packages: "com.nikhil.common_lib.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.nikhil.common_lib.event.BookingConfirmedEvent

  # SMTP configuration.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true
            required: true

        debug: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false


# =============================================================================
# EUREKA CLIENT
# =============================================================================

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    register-with-eureka: true
    fetch-registry: true


# =============================================================================
# TWILIO
# =============================================================================

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER}
  enabled: ${TWILIO_ENABLED:false}


# =============================================================================
# NOTIFICATION
# =============================================================================

notification:
  from-email: ${MAIL_FROM}
  from-name: ${MAIL_FROM_NAME:TravelSphere Notifications}
  support-email: ${SUPPORT_EMAIL}
  support-phone: ${SUPPORT_PHONE}
  checkin-url: ${CHECKIN_URL}
  manage-booking-url: ${MANAGE_BOOKING_URL}


# =============================================================================
# ACTUATOR INFO
# =============================================================================

info:
  app:
    name: ${spring.application.name}
    description: Sends email and SMS notifications for booking confirmations and alerts
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        http.server.requests: true

  observations:
    key-values:
      application: ${spring.application.name}

    annotations:
      enabled: true

  tracing:
    sampling:
      probability: 1.0

    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}


# =============================================================================
# LOGGING
# =============================================================================

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}