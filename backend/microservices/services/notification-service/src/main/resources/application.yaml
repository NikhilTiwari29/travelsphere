# Notification Service is event-driven — it does not receive booking HTTP calls directly.
# It consumes booking.confirmed from Kafka and sends email/SMS to passengers.
server:
  # Fixed port for local dev; not exposed through API Gateway in current architecture.
  port: 8094

spring:
  application:
    # Registered with Eureka; other services do not call this synchronously today.
    name: notification-service

  config:
    # Pulls SMTP/Twilio secrets from Config Server when deployed.
    import: optional:configserver:http://localhost:8888

  # Kafka consumer: booking-service publishes BookingConfirmedEvent after payment succeeds.
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      # Consumer group ensures each message is processed once per notification instance.
      group-id: notification-service-group
      # Read from beginning when no committed offset exists (first deployment).
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "com.nikhil.common_lib.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.nikhil.common_lib.event.BookingConfirmedEvent

  # ── Email (Gmail SMTP) ──────────────────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your email}
    password: ${MAIL_APP_PASSWORD:your gmail app password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # ── Thymeleaf ───────────────────────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false   # set to true in production

# ── Eureka ─────────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}



# ── Twilio SMS ─────────────────────────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
  enabled: ${TWILIO_ENABLED:false}

# ── Notification Settings ──────────────────────────────────────────────────────
notification:
  from-email: ${MAIL_FROM:codewithnikhil@gmail.com}
  from-name: "TravelSphere Notifications"
  support-email: codewithnikhil@gmail.co
  support-phone: "1800-XXX-XXXX"
  checkin-url: localhost:5173
  manage-booking-url: localhost:5173
# ── Actuator ───────────────────────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    description: Sends email and SMS notifications for booking confirmations and alerts
    version: 1.0.0
    environment: development

# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        # Exposes health, application info, metrics, and Prometheus endpoints.
        include: health,info,metrics,prometheus

  endpoint:
    health:
      # Displays detailed health information for monitoring.
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      # Adds the application name as a common tag to all metrics.
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        # Enables latency histograms for HTTP request metrics.
        http.server.requests: true

  observations:
    key-values:
      # Adds the application name to all observations (metrics and traces).
      application: ${spring.application.name}

    annotations:
      # Enables Micrometer observation annotations (@Observed).
      enabled: true

  tracing:
    sampling:
      # Samples 100% of requests for distributed tracing.
      probability: 1.0

    export:
      zipkin:
        # Exports tracing spans to Grafana Tempo using the Zipkin protocol.
        endpoint: http://localhost:9411/api/v2/spans


# =============================================================================
# LOGGING
# =============================================================================

logging:
  pattern:
    # Includes Trace ID and Span ID in every log entry for log-trace correlation.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender for centralized log aggregation.
  url: http://localhost:3100/loki/api/v1/push
