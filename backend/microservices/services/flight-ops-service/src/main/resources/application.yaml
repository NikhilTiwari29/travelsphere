# =============================================================================
# SERVER
# =============================================================================

server:
  # HTTP port on which this microservice listens.
  port: 5002


# =============================================================================
# SPRING
# =============================================================================

spring:
  application:
    # Unique service name registered with Eureka and observability tools.
    name: flight-ops-service

  # Database connection details supplied through environment variables.
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      # Suitable for development. Use Flyway/Liquibase migrations in production.
      ddl-auto: update

  # Redis backs Spring Cache for frequently accessed flight data.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # Enables Redis as the backend for Spring Cache.
  cache:
    type: redis

  # Publishes flight lifecycle events.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

  # Enables Feign circuit breakers.
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

        group:
          enabled: true


# =============================================================================
# RESILIENCE4J
# =============================================================================

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

        ignore-exceptions:
          - com.nikhil.common_lib.exception.UserException
          - com.nikhil.common_lib.exception.AirportException

    instances:
      AirlineClient:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s

      LocationClient:
        base-config: default
        wait-duration-in-open-state: 20s

      PricingClient:
        base-config: default

      SeatClient:
        base-config: default


# =============================================================================
# EUREKA CLIENT
# =============================================================================

eureka:
  instance:
    # Registers the service using its IP address.
    prefer-ip-address: true

    # Generates a unique instance ID for each running service instance.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    # Registers this service with Eureka.
    register-with-eureka: true

    # Downloads the service registry to discover other microservices.
    fetch-registry: true


# =============================================================================
# ACTUATOR INFO
# =============================================================================

info:
  app:
    name: ${spring.application.name}
    description: Manages flight schedules, instances, and real-time flight operations
    version: 1.0.0
    environment: development


# =============================================================================
# ACTUATOR, METRICS, OBSERVABILITY, AND TRACING
# =============================================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

    info:
      enabled: true

  info:
    env:
      enabled: true

    java:
      enabled: true

    os:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        http.server.requests: true

  observations:
    key-values:
      application: ${spring.application.name}

    annotations:
      enabled: true

  tracing:
    sampling:
      probability: 1.0

    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}


# =============================================================================
# LOGGING
# =============================================================================

logging:
  level:
    root: INFO
    com.nikhil.services: DEBUG

  pattern:
    # Includes Trace ID and Span ID in every log entry.
    correlation: "[%X{traceId:-},%X{spanId:-}] "


# =============================================================================
# LOKI
# =============================================================================

loki:
  # Loki endpoint used by the Logback appender.
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}