# Eureka Service Registry is the discovery hub for the microservices.
# Services register here, and callers resolve service names instead of hardcoded hosts.
server:
  port: 8761

spring:
  application:
    name: service-registry

# A Eureka server does not register with itself or fetch a registry from itself.
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
