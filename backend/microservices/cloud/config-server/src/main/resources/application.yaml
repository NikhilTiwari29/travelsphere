# Config Server provides centralized configuration to every microservice.
# Services import this server at startup and merge remote config with local defaults.
server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        # The Git repository is the source of shared and service-specific config files.
        git:
          uri: https://github.com/NikhilTiwari29/nikhil-air-config
          clone-on-start: true

# Registers Config Server with Eureka so services can discover it by service name.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: false   # config-server registers so others can discover it, but does not need the registry itself
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Metadata exposed through the Actuator info endpoint.
info:
  app:
    name: ${spring.application.name}
    description: Centralized configuration server for all microservices
    version: 1.0.0
    environment: development

# Health/info endpoints confirm the config server is reachable before services start.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
